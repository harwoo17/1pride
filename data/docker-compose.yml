services:
  postgres:
    image: postgres:16
    container_name: onepride-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: onepride
      POSTGRES_PASSWORD: lions
      POSTGRES_DB: onepride
    ports:
      - "5432:5432"
    volumes:
      - ./pg-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepride -d onepride"]
      interval: 5s
      timeout: 5s
      retries: 10
