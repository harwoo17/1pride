# fly.toml — 1PRIDE FastAPI backend
# Deploys data/src/onepride_data/api.py to api.1pride.app on Fly.io.

app = "1pride-api"
primary_region = "ord"   # Chicago — closest to the Lions, also low-latency to Neon US East

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # scale-to-zero for free tier; first request after idle wakes it
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 100
  soft_limit = 80

# Lightweight health probe — hits /health, which itself touches the DB.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "uvicorn onepride_data.api:app --host 0.0.0.0 --port 8080 --app-dir src"
